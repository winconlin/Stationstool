<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Suite - Kardiologie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .tab-btn { @apply px-6 py-3 font-bold text-sm text-slate-500 border-b-2 border-transparent hover:text-indigo-600 transition outline-none; }
        .tab-btn.active { @apply text-indigo-700 border-indigo-600 bg-indigo-50/50; }

        .anam-btn { @apply text-xs border border-slate-200 bg-white hover:bg-indigo-50 hover:border-indigo-300 text-slate-700 py-1.5 px-2 rounded transition text-left; }
        .anam-btn:active { @apply bg-indigo-100 transform scale-95; }

        .exam-cat-title { @apply text-[10px] uppercase font-bold text-slate-400 mt-2 mb-1 tracking-wider; }

        textarea { @apply font-mono text-sm leading-relaxed resize-none focus:ring-2 focus:ring-indigo-500 outline-none border-slate-300 rounded-lg; }
    </style>
</head>
<body>

    <div class="bg-white border-b shadow-sm z-20 flex justify-between items-center px-6 py-3 flex-shrink-0">
        <div class="flex items-center gap-4">
            <div class="bg-indigo-600 text-white w-10 h-10 rounded-lg flex items-center justify-center font-bold text-xl">MS</div>
            <div>
                <h1 class="font-bold text-lg text-slate-800 flex items-center gap-2">
                    <select id="patGender" class="bg-transparent border-none font-bold text-indigo-700 outline-none cursor-pointer hover:bg-slate-100 rounded" onchange="updateGlobalData()">
                        <option value="m">Herr</option>
                        <option value="f">Frau</option>
                    </select>
                    <input type="text" id="patLastName" class="bg-transparent border-b border-dashed border-slate-300 focus:border-indigo-500 outline-none w-48" placeholder="Nachname" oninput="updateGlobalData()">
                </h1>
                <div class="flex gap-4 text-xs text-slate-500 mt-0.5">
                    <span class="flex items-center gap-1">🎂 <input type="date" id="patBirth" class="bg-transparent border-none p-0 h-4 w-24 text-slate-500" onchange="updateGlobalData()"></span>
                    <span class="flex items-center gap-1">🚪 Entlassung: <input type="date" id="dateDischarge" class="bg-transparent border-none p-0 h-4 w-24 text-slate-500" onchange="updateGlobalData()"></span>
                </div>
            </div>
        </div>

        <div class="flex gap-2">
            <button onclick="switchTab('anamnese')" id="tab-btn-anamnese" class="tab-btn active">1. Anamnese</button>
            <button onclick="switchTab('status')" id="tab-btn-status" class="tab-btn">2. Status</button>
            <button onclick="switchTab('epikrise')" id="tab-btn-epikrise" class="tab-btn">3. Epikrise / Prozedur</button>
        </div>
    </div>

    <div class="flex-1 overflow-hidden relative bg-slate-100">

        <div id="tab-anamnese" class="tab-content absolute inset-0 flex p-6 gap-6">
            <div class="w-1/3 bg-white rounded-xl shadow-sm border border-slate-200 overflow-y-auto p-4 flex flex-col gap-4">
                <h3 class="font-bold text-slate-700 border-b pb-2">Baukasten</h3>
                <div id="anamnese-builder"></div> </div>
            <div class="w-2/3 flex flex-col gap-2">
                <div class="flex justify-between items-end">
                    <label class="font-bold text-slate-700">Generierte Anamnese:</label>
                    <button onclick="copyToClipboard('anamnese-out')" class="text-xs bg-indigo-100 text-indigo-700 px-3 py-1 rounded hover:bg-indigo-200 font-bold">📋 Kopieren</button>
                </div>
                <textarea id="anamnese-out" class="flex-1 p-4 shadow-sm border" placeholder="Klicken Sie links auf Bausteine..."></textarea>
            </div>
        </div>

        <div id="tab-status" class="tab-content absolute inset-0 flex p-6 gap-6 hidden">
            <div class="w-1/3 bg-white rounded-xl shadow-sm border border-slate-200 overflow-y-auto p-4 flex flex-col gap-4">
                <h3 class="font-bold text-slate-700 border-b pb-2">Status Vorlagen</h3>
                <div id="exam-builder"></div> </div>
            <div class="w-2/3 flex flex-col gap-2">
                <div class="flex justify-between items-end">
                    <label class="font-bold text-slate-700">Generierter Status:</label>
                    <button onclick="copyToClipboard('status-out')" class="text-xs bg-indigo-100 text-indigo-700 px-3 py-1 rounded hover:bg-indigo-200 font-bold">📋 Kopieren</button>
                </div>
                <textarea id="status-out" class="flex-1 p-4 shadow-sm border" placeholder="Wählen Sie links Befunde aus..."></textarea>
            </div>
        </div>

        <div id="tab-epikrise" class="tab-content absolute inset-0 flex p-6 gap-6 hidden">
            <div class="w-[380px] bg-white rounded-xl shadow-sm border border-slate-200 overflow-y-auto flex flex-col">
                <div class="p-4 border-b bg-slate-50">
                    <select id="moduleSelect" onchange="loadModule()" class="w-full p-2 border rounded font-bold text-slate-700">
                        <option value="">-- Modul wählen --</option>
                        <optgroup label="Elektrophysiologie">
                            <option value="pvi">❤️ PVI (Pulmonalveneniso)</option>
                            <option value="epu">⚡ EPU (AVNRT/WPW/Flutter)</option>
                            <option value="pm">🔋 Schrittmacher / ICD</option>
                            <option value="cv">⚡ Cardioversion (Elektrisch)</option>
                        </optgroup>
                        <optgroup label="Ischämie">
                            <option value="acs">🫀 ACS / PCI</option>
                            <option value="coro">🔍 Diagnostische Coro</option>
                        </optgroup>
                        <optgroup label="Strukturell / Sonstiges">
                            <option value="tavi">👵 TAVI / Klappe</option>
                            <option value="decomp">💧 Dekompensation</option>
                        </optgroup>
                    </select>
                </div>
                <div id="dynamicFields" class="p-4 space-y-4 flex-1">
                    <p class="text-center text-slate-400 text-sm mt-10">Bitte Modul oben wählen.</p>
                </div>
            </div>
            <div class="w-full flex flex-col gap-2">
                <div class="flex justify-between items-end">
                    <label class="font-bold text-slate-700">Generierter Brief / Prozedurbericht:</label>
                    <button onclick="copyToClipboard('epikrise-out')" class="text-xs bg-indigo-100 text-indigo-700 px-3 py-1 rounded hover:bg-indigo-200 font-bold">📋 Kopieren</button>
                </div>
                <textarea id="epikrise-out" class="flex-1 p-4 shadow-sm border" placeholder="Wählen Sie links ein Modul..."></textarea>
            </div>
        </div>

    </div>

    <script>
        // --- 1. CONFIG & DATEN ---
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dateDischarge').value = today;

        let globalPat = {
            id: "", gender: "m", name: "", dob: "", cvrf: [], meds: ""
        };

        // --- ANAMNESE CONFIG (Angepasst an Krankenhaus) ---
        const ANAMNESE_BLOCKS = {
            "Leitsymptome": [
                { t: "Dyspnoe (Belastung)", s: "Der Patient berichtet über Dyspnoe, insbesondere bei körperlicher Belastung." },
                { t: "Dyspnoe (Ruhe)", s: "Es besteht eine Ruhedyspnoe." },
                { t: "Thoraxschmerz (typisch)", s: "Der Patient klagt über typische anginöse Thoraxschmerzen (retrosternales Druckgefühl)." },
                { t: "Thoraxschmerz (atypisch)", s: "Es werden atypische Thoraxschmerzen beschrieben (stechend, atemabhängig)." },
                { t: "Palpitationen", s: "Der Patient berichtet über anfallsartiges Herzrasen." },
                { t: "Synkope", s: "Es ereignete sich eine Synkope (kurzzeitiger Bewusstseinsverlust) ohne Prodromi." },
                { t: "Beinödeme", s: "Zuletzt seien zunehmende Beinödeme aufgefallen." }
            ],
            "Verlauf": [
                { t: "Seit heute", s: "Die Beschwerden bestehen akut seit heute." },
                { t: "Seit Tagen", s: "Die Symptomatik besteht seit einigen Tagen progredient." },
                { t: "Seit Wochen", s: "Es handelt sich um ein chronisches Geschehen seit Wochen." },
                { t: "Rezidivierend", s: "Ähnliche Beschwerden seien bereits früher aufgetreten." }
            ],
            "Vegetativ": [
                { t: "B-Symptomatik neg.", s: "Fieber, Nachtschweiß und ungewollter Gewichtsverlust werden verneint." },
                { t: "Ausscheidung o.B.", s: "Miktion und Stuhlgang seien unauffällig." },
                { t: "Appetit gut", s: "Der Appetit sei erhalten." },
                { t: "Infektzeichen", s: "Aktuell bestehen Husten und Gliederschmerzen." }
            ],
            "Risikofaktoren": [
                { t: "Nikotin", s: "Es besteht ein aktiver Nikotinabusus." },
                { t: "Ex-Raucher", s: "Der Patient ist Ex-Raucher." },
                { t: "Alkohol", s: "Gelegentlicher Alkoholkonsum wird bejaht." },
                { t: "Keine Allergien", s: "Allergien sind nicht bekannt." }
            ]
        };

        // --- EXAM CONFIG (Aus deinem data_config.js übernommen) ---
        const EXAM_CONFIG = {
            "Allgemein": ["Guter AZ, normaler EZ", "Reduzierter AZ", "Adipöser EZ", "Kachektischer EZ"],
            "Cor": ["Herztöne rein, rhythmisch", "Systolikum (Spitze)", "Arrhythmie", "Leises Systolikum"],
            "Pulmo": ["VAG bds., keine RG", "Giemen/Brummen", "Rasselgeräusche basal", "Verlängertes Exspirium"],
            "Abdomen": ["Weich, kein DS", "Druckschmerz Unterbauch", "Resistenz tastbar", "Darmgeräusche regelrecht"],
            "Extremitäten": ["Keine Ödeme", "Unterschenkelödeme", "Pulsstatus intakt", "Varikosis"]
        };

        // --- 2. INIT & URL PARSING ---
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);

            // Name Parsing
            if(params.has('name')) {
                let raw = params.get('name'); // "Müller, Hans"
                if(raw.includes(',')) {
                    document.getElementById('patLastName').value = raw.split(',')[0].trim();
                } else {
                    document.getElementById('patLastName').value = raw.split(' ').pop();
                }
            }

            if(params.has('dob')) document.getElementById('patBirth').value = params.get('dob');

            // CVRF Import
            if(params.has('cvrf')) {
                try { globalPat.cvrf = JSON.parse(params.get('cvrf')); } catch(e){}
            }
            if(params.has('meds')) globalPat.meds = params.get('meds');

            renderAnamneseBuilder();
            renderExamBuilder();
            updateGlobalData();
        };

        function updateGlobalData() {
            globalPat.gender = document.getElementById('patGender').value;
            globalPat.name = document.getElementById('patLastName').value;
            globalPat.dob = document.getElementById('patBirth').value;

            // Grammatik Helper
            const isMale = globalPat.gender === 'm';
            globalPat.nom = isMale ? (globalPat.name ? `Herr ${globalPat.name}` : "Der Patient") : (globalPat.name ? `Frau ${globalPat.name}` : "Die Patientin");
            globalPat.akk = isMale ? (globalPat.name ? `Herrn ${globalPat.name}` : "den Patienten") : (globalPat.name ? `Frau ${globalPat.name}` : "die Patientin");
            globalPat.pron = isMale ? "er" : "sie";
            globalPat.poss = isMale ? "sein" : "ihr";

            // Live Updates in den Modulen falls nötig
            if(currentModuleId) updateEpikriseText();
        }

        // --- 3. UI LOGIC ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');

            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-btn-' + tabId).classList.add('active');
        }

        function copyToClipboard(areaId) {
            const el = document.getElementById(areaId);
            navigator.clipboard.writeText(el.value).then(() => {
                showToast("Erfolgreich kopiert!");
            }).catch(err => {
                console.error("Fehler beim Kopieren: ", err);
                showToast("Fehler beim Kopieren!", true);
            });
        }

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 text-white px-4 py-2 rounded shadow-lg transition-opacity duration-300 z-50 ${isError ? 'bg-red-600' : 'bg-green-600'}`;
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // --- 4. ANAMNESE BUILDER LOGIC ---
        function renderAnamneseBuilder() {
            const c = document.getElementById('anamnese-builder');
            c.innerHTML = "";
            for (const [category, items] of Object.entries(ANAMNESE_BLOCKS)) {
                let html = `<div class="exam-cat-title">${category}</div><div class="grid grid-cols-1 gap-1">`;
                items.forEach(item => {
                    // String Escape für onclick
                    const safeS = item.s.replace(/'/g, "\\'");
                    html += `<button onclick="addAnamneseText('${safeS}')" class="anam-btn">${item.t}</button>`;
                });
                html += `</div>`;
                c.innerHTML += html;
            }
            // Auto-Fill Start
            addAnamneseText(`${globalPat.nom} stellt sich vor.`, true);
        }

        function addAnamneseText(text, isStart = false) {
            const area = document.getElementById('anamnese-out');

            // Gender Anpassung im Text (einfache Ersetzung)
            let processed = text;
            if(globalPat.gender === 'f') {
                processed = processed.replace("Der Patient", "Die Patientin").replace("er ", "sie ").replace("Er ", "Sie ");
            }

            if(isStart && area.value.trim() !== "") return;
            area.value += (area.value ? " " : "") + processed;
        }

        // --- 5. EXAM BUILDER LOGIC ---
        function renderExamBuilder() {
            const c = document.getElementById('exam-builder');
            c.innerHTML = "";
            for (const [cat, opts] of Object.entries(EXAM_CONFIG)) {
                let html = `<div class="exam-cat-title">${cat}</div><div class="flex flex-wrap gap-1">`;
                opts.forEach(opt => {
                     html += `<button onclick="addExamText('${cat}', '${opt}')" class="anam-btn bg-slate-50">${opt}</button>`;
                });
                html += `</div>`;
                c.innerHTML += html;
            }
        }
        function addExamText(cat, text) {
            const area = document.getElementById('status-out');
            if(!area.value.includes(cat + ":")) {
                area.value += (area.value ? "\n" : "") + `${cat}: ${text}`;
            } else {
                // Append to existing category line? A bit complex for simple text append.
                // Simple append for now:
                area.value += `, ${text}`;
            }
        }

        // --- 6. EPIKRISE LOGIC (Der "Profi" Teil) ---
        let currentModuleId = null;

        // HIER KOMMEN DEINE MODULE REIN (PVI, ACS, etc.)
        // Ich füge hier die optimierte PVI und ACS Logik ein, die wir besprochen haben.

        const MODULES = {
            pvi: {
                fields: [
                    { id: "diag_type", label: "Art des VHF", type: "select", options: ["Paroxysmales VHF", "Persistierendes VHF", "Long-standing VHF"] },
                    { id: "ehra", label: "EHRA", type: "select", options: ["I", "II", "III", "IV"] },
                    { id: "method", label: "Methode", type: "select", options: ["Kryoballon", "Radiofrequenz (RF)", "Pulsed Field (PFA)"] },
                    { id: "la_size", label: "LA-Größe", type: "text", value: "nicht dilatiert" },
                    { id: "aar_plan", label: "Antiarrhythmika", type: "select", options: ["absetzen", "fortführen für 3 Mon.", "Amiodaron ausschleichen"] },
                    { id: "has_bled", label: "HAS-BLED", type: "number", value: 1 },
                    { id: "cha_calc", type: "calculator" }
                ],
                generate: (d, g) => {
                    const cha = calculateCha();
                    const isMale = g.gender === 'm';
                    let oak = "dauerhaft";
                    // Leitlinien Logik
                    if ((isMale && cha === 0) || (!isMale && cha <= 1)) {
                        oak = "für 3 Monate postinterventionell (Blanking Period)";
                    }

                    return `Aktuelle Diagnosen
${d.diag_type}, EHRA ${d.ehra}
CHA2DS2-VASc: ${cha}, HAS-BLED: ${d.has_bled}
- Aktuell: Erfolgreiche PVI mittels ${d.method} am ${formatDate(today)}

Epikrise
${g.nom} stellte sich zur elektiven PVI bei symptomatischem VHF vor.
Präprozedural erfolgte der Ausschluss intracavitärer Thromben mittels TEE.
Die Ablation erfolgte mittels ${d.method} komplikationslos. Alle Pulmonalvenen wurden isoliert.

Der weitere Verlauf war unauffällig. Echokardiographisch zeigte sich der linke Vorhof ${d.la_size}, kein Perikarderguss.
Die Leisten waren am Entlasstag reizlos.

Empfehlung zur Antikoagulation:
Bei einem CHA2DS2-VASc-Score von ${cha} ist eine orale Antikoagulation ${oak} indiziert.
Zusätzlich PPI für 4 Wochen.

Wir entlassen ${g.akk} am ${formatDate(document.getElementById('dateDischarge').value)} in gutem AZ.

Procedere
- OAK: ${oak}
- PPI 2x Standarddosis für 4 Wochen
- Antiarrhythmika: ${d.aar_plan}
- Körperliche Schonung für 1 Woche
- Sofortige Vorstellung bei Fieber/Schluckbeschwerden (V.a. Fistel)`;
                }
            },
            acs: {
                fields: [
                     { id: "type", label: "Typ", type: "select", options: ["NSTEMI", "STEMI", "Instabile Angina"] },
                     { id: "vessel", label: "Gefäß", type: "text", value: "RIVA" },
                     { id: "stents", label: "Stents", type: "number", value: 1 },
                     { id: "substance", label: "P2Y12", type: "select", options: ["Ticagrelor", "Prasugrel", "Clopidogrel"] }
                ],
                generate: (d, g) => {
                    return `Aktuelle Diagnosen
${d.type} bei KHK (${d.vessel})
- Aktuell: PCI (${d.stents}x DES) am ${formatDate(today)}

Epikrise
${g.nom} wurde mit ${d.type} aufgenommen. Die Koronarangiographie zeigte eine Läsion im ${d.vessel}, welche mit ${d.stents} Stent(s) versorgt wurde.
Duale Plättchenhemmung mit ASS + ${d.substance} für 12 Monate.

Wir entlassen ${g.akk} heute in gutem AZ.

Procedere
- ASS 100mg lebenslang
- ${d.substance} für 12 Monate
- Ziel-LDL < 55 mg/dl`;
                }
            }
            // Weitere Module hier einfach ergänzen...
        };

        function renderModuleFields(fields, container) {
            const fragment = document.createDocumentFragment();
            fields.forEach(f => {
                const div = document.createElement('div');
                div.className = "mb-2";

                if(f.type === 'calculator') {
                     div.innerHTML = `
                        <div class="bg-indigo-50 p-2 rounded border border-indigo-100 text-xs">
                            <label class="font-bold text-indigo-800 mb-1 block">CHA₂DS₂-VASc</label>
                            <div class="grid grid-cols-2 gap-1">
                                <label><input type="checkbox" id="c_c" onchange="updateEpikriseText()"> HI (C)</label>
                                <label><input type="checkbox" id="c_h" onchange="updateEpikriseText()"> Hyp (H)</label>
                                <label><input type="checkbox" id="c_a2" onchange="updateEpikriseText()"> Age≥75</label>
                                <label><input type="checkbox" id="c_d" onchange="updateEpikriseText()"> Diab (D)</label>
                                <label><input type="checkbox" id="c_s2" onchange="updateEpikriseText()"> Stroke</label>
                                <label><input type="checkbox" id="c_v" onchange="updateEpikriseText()"> Vasc (V)</label>
                                <label><input type="checkbox" id="c_a1" onchange="updateEpikriseText()"> 65-74</label>
                                <label><input type="checkbox" id="c_sc" disabled> Sex (Sc)</label>
                            </div>
                            <div class="text-right font-bold mt-1">Score: <span id="scoreVal">0</span></div>
                        </div>`;
                     setTimeout(precheckRisks, 50);
                } else {
                    div.innerHTML = `<label class="block text-[10px] uppercase font-bold text-slate-400 mb-0.5">${f.label}</label>`;
                    if(f.type === 'select') {
                        let h = `<select id="f_${f.id}" class="w-full border p-1.5 rounded text-sm" onchange="updateEpikriseText()">`;
                        f.options.forEach(o => h+=`<option value="${o}">${o}</option>`);
                        h += `</select>`;
                        div.innerHTML += h;
                    } else {
                        div.innerHTML += `<input type="${f.type}" id="f_${f.id}" value="${f.value||''}" class="w-full border p-1.5 rounded text-sm" oninput="updateEpikriseText()">`;
                    }
                }
                fragment.appendChild(div);
            });
            container.appendChild(fragment);
        }

        function loadModule() {
            const sel = document.getElementById('moduleSelect');
            const id = sel.value;
            currentModuleId = id;
            const container = document.getElementById('dynamicFields');
            container.innerHTML = "";

            if(!id || !MODULES[id]) {
                container.innerHTML = '<p class="text-center text-slate-400 text-sm mt-10">Bitte Modul wählen.</p>';
                return;
            }

            // Felder rendern
            renderModuleFields(MODULES[id].fields, container);
            updateEpikriseText();
        }

        function precheckRisks() {
            // Importierte CVRF nutzen
            const r = globalPat.cvrf || [];
            if(r.includes('htn')) document.getElementById('c_h').checked = true;
            if(r.includes('dm')) document.getElementById('c_d').checked = true;

            // Alter checken
            if(globalPat.dob) {
                const age = new Date().getFullYear() - new Date(globalPat.dob).getFullYear();
                if(age >= 75) document.getElementById('c_a2').checked = true;
                else if(age >= 65) document.getElementById('c_a1').checked = true;
            }
            updateEpikriseText();
        }

        function calculateCha() {
            if(!document.getElementById('c_c')) return 0;
            const isFem = globalPat.gender === 'f';
            document.getElementById('c_sc').checked = isFem;

            let s = isFem ? 1 : 0;
            if(document.getElementById('c_c').checked) s++;
            if(document.getElementById('c_h').checked) s++;
            if(document.getElementById('c_a2').checked) s+=2;
            if(document.getElementById('c_d').checked) s++;
            if(document.getElementById('c_s2').checked) s+=2;
            if(document.getElementById('c_v').checked) s++;
            if(document.getElementById('c_a1').checked) s++;

            document.getElementById('scoreVal').innerText = s;
            return s;
        }

        function updateEpikriseText() {
            if(!currentModuleId) return;

            // Daten sammeln
            const d = {};
            MODULES[currentModuleId].fields.forEach(f => {
                if(f.type !== 'calculator') {
                    d[f.id] = document.getElementById('f_' + f.id).value;
                }
            });

            // Text generieren
            const text = MODULES[currentModuleId].generate(d, globalPat);
            document.getElementById('epikrise-out').value = text;
        }

        function formatDate(s) { if(!s) return "XX.XX.XX"; const p=s.split('-'); return `${p[2]}.${p[1]}.${p[0]}`; }

    </script>
</body>
</html>
