<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stations-Assistent v17 (Ultimate Clinical)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config_base.js"></script> 
    <script src="config_meds.js"></script> 
    <script src="config_exam.js"></script> 
    <script src="config_scores.js"></script> 
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen pb-24" id="main-body">

    <div class="bg-indigo-900 text-white p-2 shadow-md no-print sticky top-0 z-50">
        <div class="max-w-[1900px] mx-auto flex justify-between items-center px-2">
            <h1 class="font-bold text-lg flex items-center gap-2">🏥 Station v17</h1>
            <div class="flex gap-2 text-sm items-center">
                <button onclick="exportData()" aria-label="Daten exportieren" title="Backup erstellen" class="bg-purple-600 hover:bg-purple-500 px-3 py-1 rounded">💾 Backup</button>
                <button onclick="exportAnonData()" aria-label="Anonyme Daten exportieren" title="Anonymes Backup erstellen" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-1 rounded">👻 Anon Backup</button>
                <label class="bg-purple-800 hover:bg-purple-700 px-3 py-1 rounded cursor-pointer">📂 Import<input type="file" id="importFile" class="hidden" onchange="importData(this)" accept=".json"></label>
                <button onclick="openImportModal()" aria-label="KIS Import öffnen" title="KIS Import" class="bg-teal-600 hover:bg-teal-500 px-3 py-1 rounded border border-teal-400">📋 KIS-Import</button>
                <div class="h-4 w-px bg-indigo-700 mx-1"></div>
                <button onclick="startNewDay()" aria-label="Neuen Tag starten" title="To-Dos zurücksetzen" class="bg-yellow-600 hover:bg-yellow-500 px-3 py-1 rounded">☀️ Tag</button>
                <select id="printProfile" onchange="changePrintMode()" class="bg-slate-700 text-white px-2 py-1 rounded outline-none cursor-pointer">
                    <option value="full">🖨️ Übergabe (Voll)</option>
                    <option value="visite">🖨️ Visite (Kompakt)</option>
                    <option value="pocket">🖨️ Pocket (Max)</option>
                </select>
                <button onclick="window.print()" class="bg-slate-600 hover:bg-slate-500 px-3 py-1 rounded font-bold">Drucken</button>
                <button onclick="addNewPatient()" aria-label="Neuen Patienten hinzufügen" title="Neuer Patient" class="bg-green-600 hover:bg-green-500 px-3 py-1 rounded font-bold">+ Patient</button>
            </div>
        </div>
    </div>

    <div class="w-full max-w-[1900px] mx-auto p-2" id="app">
        <div id="patient-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3"></div>
        <div id="empty-state" class="hidden text-center mt-20 text-slate-400"><p class="text-xl">Keine Patienten vorhanden.</p></div>
    </div>

    <div id="print-table-container">
        <table>
            <thead>
                <tr><th class="col-room">Zi.</th><th class="col-name">Patient / Status</th><th class="col-diag">Diagnosen & Medikation</th><th class="col-todo">ToDo & Verlauf</th></tr>
            </thead>
            <tbody id="print-table-body"></tbody>
        </table>
    </div>

    <div id="medModal" class="modal no-print" onkeydown="handleModalKey(event, 'medModal')">
        <div class="modal-content max-w-3xl flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center mb-2 border-b pb-2 flex-shrink-0"><h2 class="text-xl font-bold">Medikation wählen</h2><button onclick="closeMedModal()" class="text-2xl px-2">&times;</button></div>
            <div class="mb-2 flex-shrink-0"><input type="text" id="med-search" placeholder="🔍 Suche..." class="w-full border-2 border-blue-200 rounded p-2 focus:border-blue-500 outline-none text-lg"></div>
            <div id="med-selector" class="space-y-2 mb-4 overflow-y-auto flex-grow px-1"></div>
            <div class="border-t pt-4 flex-shrink-0"><input type="text" id="med-custom" class="w-full border p-2 rounded bg-slate-50 mb-2" placeholder="Zusatz..."><div class="flex justify-end gap-2"><button onclick="saveMeds()" class="bg-blue-600 text-white px-6 py-2 rounded font-bold hover:bg-blue-500">Übernehmen (Enter)</button></div></div>
        </div>
    </div>

    <div id="examModal" class="modal no-print" onkeydown="handleModalKey(event, 'examModal')">
        <div class="modal-content">
            <div class="flex justify-between items-center border-b pb-2 mb-4"><h2 class="text-xl font-bold text-blue-900">Aufnahme Generator</h2><button onclick="document.getElementById('examModal').style.display='none'" class="text-2xl px-2">&times;</button></div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div class="space-y-4 max-h-[70vh] overflow-y-auto pr-2"><div id="status-builder" class="space-y-3 text-sm"></div></div><div class="flex flex-col h-full"><textarea id="gen-text-output" class="flex-grow w-full border p-2 rounded bg-slate-50 font-mono text-sm mb-2" placeholder="Ergebnis..."></textarea><button onclick="saveExamToPatient()" class="bg-green-600 text-white px-4 py-2 rounded w-full">💾 Speichern</button></div></div>
        </div>
    </div>

    <div id="scoreModal" class="modal no-print" onkeydown="handleModalKey(event, 'scoreModal')">
        <div class="modal-content max-w-2xl"><div class="flex justify-between items-center border-b pb-2 mb-4"><h2 class="text-xl font-bold text-indigo-900">🧮 Relevante Scores</h2><button onclick="document.getElementById('scoreModal').style.display='none'" class="text-2xl px-2">&times;</button></div><div id="score-list" class="score-grid"></div><div class="mt-4 text-xs text-slate-400 text-center">Vorschläge basieren auf Alter und Schlüsselwörtern.</div></div>
    </div>

    <div id="importModal" class="modal no-print" onkeydown="handleModalKey(event, 'importModal')">
        <div class="modal-content max-w-4xl h-[80vh] flex flex-col"><div class="flex justify-between items-center border-b pb-2 mb-2"><h2 class="text-xl font-bold text-teal-800">Import aus Medico</h2><button onclick="document.getElementById('importModal').style.display='none'" class="text-2xl px-2">&times;</button></div><div class="grid grid-cols-1 md:grid-cols-2 gap-4 flex-grow overflow-hidden"><div class="flex flex-col gap-2"><textarea id="pasteArea" class="w-full flex-grow border p-2 font-mono text-xs bg-slate-50 rounded resize-none" placeholder="Format: [Zi] [FallNr] Name..." oninput="parsePasteData()"></textarea></div><div class="flex flex-col gap-2"><div class="flex justify-between items-end"><p class="text-sm font-bold">Vorschau (<span id="previewCount">0</span>)</p></div><div id="importPreview" class="flex-grow border rounded bg-white overflow-y-auto p-2 space-y-2"></div><button onclick="executeImport()" class="bg-teal-600 text-white font-bold py-2 rounded hover:bg-teal-500 disabled:opacity-50" id="btnImportAction" disabled>Importieren</button></div></div></div>
    </div>

    <script>
        if(typeof MED_GROUPS === 'undefined') showToast("ACHTUNG: Config Dateien fehlen!", true);

        const AppState = { patients: [], currentEditingId: null, tempSelectedMeds: new Set(), parsedPatients: [] };




        function showToast(msg, isError = false) { const t = document.createElement("div"); t.className = `fixed bottom-4 right-4 text-white px-4 py-2 rounded shadow-lg transition-opacity duration-300 z-50 ${isError ? "bg-red-600" : "bg-green-600"}`; t.innerText = msg; document.body.appendChild(t); setTimeout(() => { t.style.opacity = "0"; setTimeout(() => t.remove(), 300); }, 2000); }

        window.onload = function() {
            loadData();
            render();
            document.getElementById('med-search').addEventListener('input', (e) => { renderMedList(e.target.value); });
            setupExamBuilder();
            document.addEventListener('keydown', function(e) { if (e.ctrlKey && e.altKey && e.key === 'n') addNewPatient(); });
        };
        
        function changePrintMode() {
            const mode = document.getElementById('printProfile').value;
            const body = document.getElementById('main-body');
            body.classList.remove('print-mode-visite', 'print-mode-pocket');
            if(mode === 'visite') body.classList.add('print-mode-visite');
            if(mode === 'pocket') body.classList.add('print-mode-pocket');
        }

        function resizeTx(el) { el.style.height = 'auto'; el.style.height = (el.scrollHeight) + 'px'; }
        function loadData() { const stored = localStorage.getItem('station_v17_data'); if (stored) AppState.patients = JSON.parse(stored); }
        function saveData() { localStorage.setItem('station_v17_data', JSON.stringify(AppState.patients)); }
        
        function getDaysSince(dateString) {
            if(!dateString) return 0;
            const d = new Date(dateString); const now = new Date();
            return Math.floor((now - d) / (1000*60*60*24)) + 1;
        }

        // --- MODEL UPDATES (Deep properties) ---
        function updateDeepField(id, obj, field, val) { const p = AppState.patients.find(x => x.id === id); if(!p[obj]) p[obj] = {}; p[obj][field] = val; saveData(); }
        function updateDeepFieldRender(id, obj, field, val) { updateDeepField(id, obj, field, val); render(); }
        
        // Arrays/Complex
        function addIso(id, val) { if(!val) return; const p = AppState.patients.find(x => x.id === id); if(!p.iso) p.iso = []; if(!p.iso.includes(val)) p.iso.push(val); saveData(); render(); }
        function removeIso(id, val) { const p = AppState.patients.find(x => x.id === id); p.iso = p.iso.filter(x => x !== val); saveData(); render(); }
        function addAbx(id) { const name = prompt("Antibiotikum Name:"); if(name) { const p = AppState.patients.find(x => x.id===id); if(!p.abx) p.abx = []; p.abx.push({name: name, start: new Date().toISOString().split('T')[0]}); saveData(); render(); } }
        function removeAbx(id, idx) { const p = AppState.patients.find(x => x.id===id); p.abx.splice(idx, 1); saveData(); render(); }
        function addAmio(id) { let val = parseFloat(prompt("Dosis in g hinzufügen (z.B. 0.9):", "0.9")); if(!isNaN(val)) { let p = AppState.patients.find(x => x.id === id); p.amio = (p.amio || 0) + val; saveData(); render(); } }
        function toggleTodoLine(id, idx) { const p = AppState.patients.find(x => x.id === id); let lines = (p.todo_text || "").split('\n').filter(l => l.trim() !== ''); if(lines[idx].startsWith('[x] ')) { lines[idx] = lines[idx].replace('[x] ', '[ ] '); } else if(lines[idx].startsWith('[ ] ')) { lines[idx] = lines[idx].replace('[ ] ', '[x] '); } else { lines[idx] = '[x] ' + lines[idx]; } p.todo_text = lines.join('\n'); saveData(); render(); }
        function deleteTodoLine(id, idx) { const p = AppState.patients.find(x => x.id === id); let lines = (p.todo_text || "").split('\n').filter(l => l.trim() !== ''); lines.splice(idx, 1); p.todo_text = lines.join('\n'); saveData(); render(); }
        function addTodoLine(id, text) { if(!text.trim()) return; const p = AppState.patients.find(x => x.id === id); let lines = (p.todo_text || "").split('\n').filter(l => l.trim() !== ''); lines.push('[ ] ' + text.trim()); p.todo_text = lines.join('\n'); saveData(); render(); }
        function toggleConsult(id, c) { const p = AppState.patients.find(x => x.id === id); if(!p.consults) p.consults = {}; p.consults[c] = ((p.consults[c] || 0) + 1) % 3; saveData(); render(); }

        // --- RENDER LOGIC ---
        function render() {
            const container = document.getElementById('patient-list');
            const printBody = document.getElementById('print-table-body');
            const empty = document.getElementById('empty-state');
            container.innerHTML = ''; printBody.innerHTML = ''; 

            if(AppState.patients.length===0) { empty.classList.remove('hidden'); return; } else empty.classList.add('hidden');
            AppState.patients.sort((a,b) => a.room.localeCompare(b.room, undefined, {numeric: true}));

            let currentRoom = null;
            const containerFrag = document.createDocumentFragment();
            const printBodyFrag = document.createDocumentFragment();


            AppState.patients.forEach(p => {
                // Ensure structured objects exist for older backups
                const labs = p.labs || {hb:'', krea:'', egfr:'', k:'', bnp:'', crp:''};
                const vol = p.vol || {ziel:'', aktuell:''};
                const social = p.social || {reha:'', physio:'', pflegegrad:''};
                const isos = p.iso || [];
                const abx = p.abx || [];

                let displayRoom = p.room ? p.room : "Gang";
                if(displayRoom !== currentRoom) {
                    currentRoom = displayRoom;
                    let roomHeader = document.createElement('div');
                    roomHeader.className = "col-span-full mt-4 mb-1 flex items-center gap-2 border-b border-indigo-200 pb-1 no-print";
                    roomHeader.innerHTML = `<span class="bg-indigo-600 text-white font-bold px-3 py-1 rounded shadow-sm">Zimmer ${currentRoom}</span>`;
                    containerFrag.appendChild(roomHeader);
                }

                const age = getAge(p.dob);
                const dnrClass = p.dnr ? 'resus-active' : ''; const dniClass = p.dni ? 'resus-active' : '';
                
                let card = document.createElement('div');
                card.className = "bg-white rounded border border-slate-300 p-2 patient-card flex flex-col gap-1 shadow-sm hover:shadow-md transition relative";
                
                // HEADER (Zi, Name, Rhythmus, Nüchtern)
                let rhythmSel = `<select onchange="updateFieldRender('${p.id}', 'rhythm', this.value)" class="text-[10px] font-bold outline-none bg-transparent cursor-pointer ${p.rhythm === 'VHF' || p.rhythm === 'AF' ? 'vhf-blink' : 'text-slate-500'}"><option value="SR" ${p.rhythm==='SR'?'selected':''}>[ SR ]</option><option value="VHF" ${p.rhythm==='VHF'?'selected':''}>[ VHF ]</option><option value="AF" ${p.rhythm==='AF'?'selected':''}>[ A-Flatt ]</option><option value="PM/ICD" ${p.rhythm==='PM/ICD'?'selected':''}>[ PM/ICD ]</option></select>`;
                let fastBtn = `<button onclick="updateFieldRender('${p.id}', 'fasting', ${!p.fasting})" class="text-[8px] px-1 py-0.5 rounded font-bold transition-colors ${p.fasting ? 'badge-nüchtern' : 'badge-kost'}">${p.fasting ? '⛔ Nüchtern' : '🍔 Kostaufbau'}</button>`;
                
                let header = `<div class="flex justify-between items-start pb-1 border-b border-slate-100"><div class="flex items-center gap-2 w-full"><input type="text" data-pid="${p.id}" value="${p.room}" onblur="updateFieldRender('${p.id}', 'room', this.value)" class="font-bold text-xl w-12 text-center text-blue-900 bg-blue-50 rounded p-room" placeholder="#"><div class="w-full"><div class="flex items-center gap-1"><input type="text" value="${p.name}" onblur="updateFieldRender('${p.id}', 'name', this.value)" class="font-bold text-sm text-slate-900 p-name flex-grow" placeholder="Name">${rhythmSel}</div><div class="flex items-center gap-1 no-print"><input type="date" value="${p.dob}" onblur="updateFieldRender('${p.id}', 'dob', this.value)" class="text-[10px] text-slate-400 w-24 bg-transparent"><span class="text-xs font-bold">${age}</span></div></div></div><div class="flex flex-col gap-1 items-end"><div class="flex gap-1 items-center">${fastBtn}<button onclick="toggleResus('${p.id}', 'dnr')" class="resus-btn ${dnrClass}">DNR</button><button onclick="toggleResus('${p.id}', 'dni')" class="resus-btn ${dniClass}">DNI</button></div><button onclick="deletePatient('${p.id}')" aria-label="Patient löschen" title="Patient löschen" tabindex="-1" class="text-slate-300 hover:text-red-500 text-lg leading-none no-print">&times;</button></div></div>`;
                
                // ISOLATION & WARNUNGEN
                let warnColor = p.warnings ? 'bg-red-100 border-red-300 text-red-800 font-bold' : 'bg-slate-50 border-slate-200 text-slate-400 italic';
                let isoTags = isos.map(iso => `<span class="text-[8px] bg-red-600 text-white px-1 rounded font-bold flex items-center gap-1">${iso} <button onclick="removeIso('${p.id}', '${iso}')" class="hover:text-red-200">×</button></span>`).join('');
                let isoSel = `<select onchange="addIso('${p.id}', this.value); this.value='';" class="text-[8px] bg-red-50 text-red-700 border border-red-200 rounded outline-none w-16"><option value="">+ Keim/Iso</option><option value="MRSA">MRSA</option><option value="3MRGN">3MRGN</option><option value="4MRGN">4MRGN</option><option value="VRE">VRE</option><option value="CDAD">Clostr.</option><option value="Influenza">Influenza</option><option value="RSV">RSV</option><option value="Covid">Covid</option></select>`;
                let warnHtml = `<div class="flex flex-wrap items-center gap-1"><input type="text" value="${p.warnings || ''}" onblur="updateField('${p.id}', 'warnings', this.value)" class="flex-grow text-[10px] rounded p-1 outline-none transition-colors uppercase placeholder-slate-300 ${warnColor}" placeholder="⚠️ Allergien / Warnungen...">${isoTags}${isoSel}</div>`;

                // DIAGNOSEN
                let diagTextClass = p.expDiag ? "text-expanded" : (p.diagnosis && p.diagnosis.length > 150 ? "text-truncated" : "");
                let diagToggleBtn = (p.diagnosis && p.diagnosis.length > 150) ? `<button onclick="updateFieldRender('${p.id}', 'expDiag', ${!p.expDiag})" class="text-[9px] text-blue-500 hover:underline w-full text-right bg-red-50 pr-1 pb-1 rounded-b">${p.expDiag ? 'Weniger anzeigen' : 'Mehr lesen...'}</button>` : '';
                let diag = `<div class="bg-red-50 rounded border border-red-100 relative p-1 flex flex-col gap-1"><input type="text" value="${p.main_diagnosis || ''}" onblur="updateField('${p.id}', 'main_diagnosis', this.value)" class="w-full text-sm font-black text-red-900 bg-red-100/50 placeholder-red-300 outline-none p-1 rounded" placeholder="HAUPTDIAGNOSE / Aufnahmegrund"><textarea oninput="resizeTx(this); updateField('${p.id}', 'diagnosis', this.value)" class="auto-expand w-full text-xs font-medium text-red-900 bg-transparent leading-tight outline-none ${diagTextClass}" placeholder="Weitere Diagnosen...">${p.diagnosis || ''}</textarea>${diagToggleBtn}</div>`;
                let cvrfHtml = `<div class="flex gap-2 justify-center py-1">`; if(typeof CVRF_CONFIG !== 'undefined') CVRF_CONFIG.forEach(c => { const active = p.cvrf && p.cvrf.includes(c.key) ? 'cvrf-active' : ''; cvrfHtml += `<button type="button" onclick="toggleCVRF('${p.id}', '${c.key}')" class="cvrf-btn ${active} text-sm p-0.5" title="${c.label}">${c.icon}</button>`; }); cvrfHtml += `</div>`;
                
                // QUICK LABS & VOLUMEN
                let eGFRWarn = labs.egfr && labs.egfr < 30 ? 'egfr-warn' : 'bg-white';
                let labsVolHtml = `
                <div class="flex flex-col gap-1 no-print">
                    <div class="grid grid-cols-5 gap-1 bg-blue-50 border border-blue-100 rounded p-1">
                        <div class="flex flex-col"><label class="text-[7px] text-blue-600 font-bold uppercase">Hb</label><input value="${labs.hb}" onblur="updateDeepField('${p.id}','labs','hb',this.value)" class="text-[9px] bg-transparent outline-none border-b border-blue-200"></div>
                        <div class="flex flex-col"><label class="text-[7px] text-blue-600 font-bold uppercase">Krea</label><input value="${labs.krea}" onblur="updateDeepField('${p.id}','labs','krea',this.value)" class="text-[9px] bg-transparent outline-none border-b border-blue-200"></div>
                        <div class="flex flex-col"><label class="text-[7px] text-blue-600 font-bold uppercase">eGFR</label><input value="${labs.egfr}" onblur="updateDeepFieldRender('${p.id}','labs','egfr',this.value)" class="text-[9px] outline-none border-b border-blue-200 rounded-t ${eGFRWarn}"></div>
                        <div class="flex flex-col"><label class="text-[7px] text-blue-600 font-bold uppercase">K+</label><input value="${labs.k}" onblur="updateDeepField('${p.id}','labs','k',this.value)" class="text-[9px] bg-transparent outline-none border-b border-blue-200"></div>
                        <div class="flex flex-col"><label class="text-[7px] text-blue-600 font-bold uppercase">CRP/BNP</label><input value="${labs.crp}" onblur="updateDeepField('${p.id}','labs','crp',this.value)" class="text-[9px] bg-transparent outline-none border-b border-blue-200" placeholder="z.B. 10|2000"></div>
                    </div>
                    <div class="flex gap-2 items-center bg-cyan-50 border border-cyan-100 rounded p-1 text-[9px]">
                        <span class="font-bold text-cyan-700">⚖️ Vol:</span>
                        <label class="text-cyan-600 font-semibold">Ziel:</label><input value="${vol.ziel}" onblur="updateDeepField('${p.id}','vol','ziel',this.value)" placeholder="-500" class="w-10 bg-transparent outline-none border-b border-cyan-200">
                        <label class="text-cyan-600 font-semibold">Aktuell:</label><input value="${vol.aktuell}" onblur="updateDeepField('${p.id}','vol','aktuell',this.value)" placeholder="+200" class="w-10 bg-transparent outline-none border-b border-cyan-200">
                    </div>
                </div>`;

                let tasksHtml = `<div class="grid grid-cols-6 gap-0.5 mb-1 daily-grid">`; if(typeof DAILY_TASKS !== 'undefined') DAILY_TASKS.forEach(t => { const cls = (p.daily && p.daily[t.key]) ? 'task-true' : 'task-false'; tasksHtml += `<button type="button" onclick="toggleDaily('${p.id}', '${t.key}')" class="task-btn ${cls} text-[9px] text-center py-0.5 rounded">${t.label}</button>`; }); tasksHtml += `</div>`;
                
                let todoHtml = `<div class="bg-yellow-50 border border-yellow-200 rounded p-1 relative group flex flex-col">`;
                if(p.showRawTodo) { todoHtml += `<textarea onblur="updateFieldRender('${p.id}', 'todo_text', this.value); updateFieldRender('${p.id}', 'showRawTodo', false)" class="auto-expand w-full text-xs bg-white border border-yellow-300 rounded p-1 leading-tight focus:ring-2 focus:ring-yellow-500" placeholder="Freitext To-Dos...">${p.todo_text || ""}</textarea><button onclick="updateFieldRender('${p.id}', 'showRawTodo', false)" class="text-[9px] text-yellow-700 bg-yellow-200 hover:bg-yellow-300 rounded px-1 mt-1 self-end">Fertig</button>`;
                } else { let lines = (p.todo_text || "").split('\n').filter(l => l.trim() !== ''); if(lines.length > 0) { todoHtml += `<div class="flex flex-col gap-0.5 mb-1">`; lines.forEach((line, idx) => { let isDone = line.startsWith('[x] '); let cleanLine = line.replace(/^(\[x\] |\[ \] )/i, '').trim(); let icon = isDone ? '✅' : '🔲'; let strike = isDone ? 'line-through text-slate-400' : 'text-slate-800 font-medium'; todoHtml += `<div class="flex items-start justify-between gap-1 hover:bg-yellow-200 p-0.5 rounded transition"><div class="flex items-start gap-1 cursor-pointer flex-grow" onclick="toggleTodoLine('${p.id}', ${idx})"><span class="mt-0.5 text-[10px]">${icon}</span><span class="text-xs ${strike} leading-tight">${cleanLine}</span></div>`; if(isDone) { todoHtml += `<button onclick="deleteTodoLine('${p.id}', ${idx})" class="text-[9px] bg-red-100 text-red-600 hover:bg-red-500 hover:text-white rounded px-1 ml-1">❌</button>`; } todoHtml += `</div>`; }); todoHtml += `</div>`; } else { todoHtml += `<span class="text-[10px] text-slate-400 italic px-1 mb-1">Keine To-Dos...</span>`; } todoHtml += `<input type="text" placeholder="+ Neues To-Do (Enter)" class="w-full text-xs bg-white border border-yellow-300 rounded p-1 outline-none focus:ring-1 focus:ring-yellow-500" onkeydown="if(event.key==='Enter'){ addTodoLine('${p.id}', this.value); this.value=''; }"><button onclick="updateFieldRender('${p.id}', 'showRawTodo', true)" class="absolute top-1 right-1 text-[10px] text-yellow-600 opacity-0 group-hover:opacity-100 transition bg-yellow-100 px-1 rounded shadow-sm">✏️ Edit</button>`; } todoHtml += `</div>`;

                let histTextClass = p.expHist ? "text-expanded" : (p.history && p.history.length > 100 ? "text-truncated" : "");

        function openImportModal() { document.getElementById('importModal').style.display='block'; document.getElementById('pasteArea').value=''; document.getElementById('importPreview').innerHTML=''; document.getElementById('pasteArea').focus(); }
        function parsePasteData() { const raw = document.getElementById('pasteArea').value; const preview = document.getElementById('importPreview'); parsedPatients = []; preview.innerHTML = ''; const lines = raw.split(/\r?\n/); lines.forEach(line => { if(!line.trim()) return; let room = "", name = "", dob = ""; const dateMatch = line.match(/(\d{2}\.\d{2}\.\d{4})/); if(dateMatch) { const dStr = dateMatch[0]; const parts = dStr.split('.'); dob = `${parts[2]}-${parts[1]}-${parts[0]}`; } else return; const nameMatch = line.match(/([a-zA-ZäöüÄÖÜß-]+,\s*[a-zA-ZäöüÄÖÜß-]+)/); if(nameMatch) name = nameMatch[0].trim(); if(name) { const leftPart = line.split(name)[0]; const caseIdMatch = leftPart.match(/\b\d{8,}\b/); const roomMatches = leftPart.match(/\b\d{1,3}\.?\d{0,3}\b/g); let potentialRooms = []; if(roomMatches) potentialRooms = roomMatches.filter(r => r.replace('.','').length < 6); if(potentialRooms.length > 0) { room = potentialRooms[0]; } else if (caseIdMatch) { room = "Gang"; } } if(name && dob) { parsedPatients.push({ room, name, dob }); const div = document.createElement('div'); div.className = "flex justify-between items-center bg-slate-50 p-2 border rounded text-xs"; div.innerHTML = `<div class="flex gap-2 items-center"><span class="font-bold bg-blue-100 text-blue-800 px-1 rounded w-12 text-center">${room||"?"}</span><span class="font-bold">${name}</span><span class="text-slate-500">*${dob}</span></div><span class="text-green-600 font-bold">✓</span>`; preview.appendChild(div); } }); document.getElementById('previewCount').innerText = parsedPatients.length; document.getElementById('btnImportAction').disabled = parsedPatients.length === 0; }
        function executeImport() { if(parsedPatients.length===0) return; let count=0; parsedPatients.forEach(imp => { const exists = patients.some(p => p.name === imp.name); if(!exists) { const id = Date.now().toString() + Math.random().toString().slice(2,5); patients.push({id, room: imp.room, name: imp.name, dob: imp.dob, diagnosis: "", main_diagnosis: "", history: "", cvrf: [], meds_current: "", meds_paused: "", dapt_oak: "", discharge_date: "", daily: {}, diag_status: {}, diag_results: {}, dnr: false, dni: false, exam_text: "", warnings: "", showRawTodo: false, consults: {}, amio: 0, fasting: false, rhythm: 'SR', iso: [], abx: [], consult_notes: {}, social: {reha:'', physio:'', pflegegrad:''}, labs: {hb:'', krea:'', egfr:'', k:'', bnp:'', crp:''}, vol: {ziel:'', aktuell:''} }); count++; } }); saveData(); render(); document.getElementById('importModal').style.display='none'; alert(`${count} Patienten importiert.`); }

        function exportData() { const d = JSON.stringify(patients, null, 2); const b = new Blob([d], {type: "application/json"}); const u = URL.createObjectURL(b); const a = document.createElement('a'); a.href = u; a.download = `station_backup_${new Date().toISOString().slice(0,10)}.json`; document.body.appendChild(a); a.click(); document.body.removeChild(a); }
        function importData(i) { const f = i.files[0]; if(!f)return; const r = new FileReader(); r.onload=function(e){try{const d=JSON.parse(e.target.result);if(Array.isArray(d)){if(confirm(`Backup mit ${d.length} Patienten laden?`)){patients=d;saveData();render();alert("Geladen!");}}}catch(err){alert("Fehler!");}};r.readAsText(f);i.value=''; }
        function addNewPatient() { const id = Date.now().toString(); patients.push({id, room: "", name: "", dob: "", diagnosis: "", main_diagnosis: "", history: "", cvrf: [], meds_current: "", meds_paused: "", dapt_oak: "", discharge_date: "", daily: {}, diag_status: {}, diag_results: {}, dnr: false, dni: false, exam_text: "", warnings: "", showRawTodo: false, consults: {}, amio: 0, fasting: false, rhythm: 'SR', iso: [], abx: [], consult_notes: {}, social: {reha:'', physio:'', pflegegrad:''}, labs: {hb:'', krea:'', egfr:'', k:'', bnp:'', crp:''}, vol: {ziel:'', aktuell:''} }); saveData(); render(); setTimeout(()=>{const i=document.querySelector(`input[data-pid="${id}"]`);if(i)i.focus();},100); }

        function handleModalKey(e, mId) { if(e.key==="Escape")document.getElementById(mId).style.display="none"; if(e.key==="Enter"&&e.target.tagName!=='TEXTAREA'&&mId==='medModal')saveMeds(); }
        function toggleTempMed(n, c) { if(c) AppState.tempSelectedMeds.add(n); else AppState.tempSelectedMeds.delete(n); }
        function renderMedList(f) { const c = document.getElementById('med-selector'); const s = f.toLowerCase(); let finalHtml = ""; for (const [g, m] of Object.entries(MED_GROUPS)) { const mm = m.filter(x=>x.toLowerCase().includes(s)); if(s&&mm.length===0)continue; const open=s?"open":""; let h=`<details ${open} class="group bg-slate-50 border border-slate-200 rounded"><summary class="cursor-pointer p-2 font-bold text-sm text-slate-700 hover:bg-slate-100 select-none flex justify-between items-center"><span>${g}</span><span class="text-xs text-slate-400">▼</span></summary><div class="p-2 bg-white border-t border-slate-100 grid grid-cols-2 md:grid-cols-4 gap-2">`; mm.forEach(x=>{ const ch=AppState.tempSelectedMeds.has(x)?"checked":""; h+=`<label class="flex items-center gap-1 text-xs cursor-pointer hover:bg-blue-50 p-1 rounded focus-within:ring-2 focus-within:ring-blue-500"><input type="checkbox" value="${x}" class="accent-blue-600" ${ch} onchange="toggleTempMed('${x}', this.checked)"> ${x}</label>`; }); h+=`</div></details>`; finalHtml+=h; } c.innerHTML = finalHtml; }
        function saveMeds() { const p = AppState.patients.find(x => x.id === AppState.currentEditingId); const s = Array.from(AppState.tempSelectedMeds); const c = document.getElementById('med-custom').value; if(c) s.push(c); s.sort(); p.meds_current = s.join(", "); saveData(); render(); closeMedModal(); }

        function toggleDiag(e, id, d) { e.preventDefault(); const p = AppState.patients.find(x => x.id === id); if(!p.diag_status) p.diag_status={}; p.diag_status[d] = ((p.diag_status[d]||0)+1)%3; if(e.type==='contextmenu'){ const r = prompt(`Befund ${d}:`, (p.diag_results||{})[d]||""); if(r!==null){ if(!p.diag_results)p.diag_results={}; p.diag_results[d]=r; if(r)p.diag_status[d]=2; }} saveData(); render(); setTimeout(()=>{const b=document.getElementById(`btn-diag-${id}-${d}`);if(b)b.focus();},50); }
        function toggleCVRF(id, k) { const p = AppState.patients.find(x => x.id === id); if(!p.cvrf) p.cvrf=[]; if(p.cvrf.includes(k)) p.cvrf=p.cvrf.filter(x=>x!==k); else p.cvrf.push(k); saveData(); render(); }
        function toggleResus(id, t) { const p = AppState.patients.find(x => x.id === id); if(p){p[t]=!p[t];saveData();render();} }
        function toggleDaily(id, k) { const p = AppState.patients.find(x => x.id === id); if(!p.daily) p.daily={}; p.daily[k]=!p.daily[k]; saveData(); render(); }
        function deletePatient(id) { if(confirm("Löschen?")) { AppState.patients=AppState.patients.filter(x=>x.id!==id); saveData(); render(); } }
        function startNewDay() { if(confirm("Neuer Tag?")) { AppState.patients.forEach(p=>p.daily={}); saveData(); render(); } }
        
        function setupExamBuilder() { const c = document.getElementById('status-builder'); if(typeof EXAM_CONFIG === 'undefined') return; let fullHtml = ""; for(const [k, d] of Object.entries(EXAM_CONFIG)) { let h=`<div class="border rounded bg-slate-50 p-2"><div class="font-bold text-xs text-slate-500 uppercase mb-1">${k}</div><div class="flex flex-wrap gap-1">`; d.options.forEach(o => { h+=`<button class="px-2 py-1 bg-white hover:bg-blue-100 border border-slate-200 rounded text-xs transition" onclick="insertExamText('${k}', '${o}')">${o}</button>`; }); h+=`</div></div>`; fullHtml += h; } c.innerHTML = fullHtml; }
        function openExamModal(id) { AppState.currentEditingId = id; const p = AppState.patients.find(x => x.id === id); document.getElementById('gen-text-output').value = p.exam_text || "Standard Aufnahme..."; document.getElementById('examModal').style.display = "block"; }
        function insertExamText(c, t) { document.getElementById('gen-text-output').value += `\n[${c}]: ${t}`; }
        function saveExamToPatient() { AppState.patients.find(x => x.id === AppState.currentEditingId).exam_text = document.getElementById('gen-text-output').value; saveData(); document.getElementById('examModal').style.display = 'none'; }
        
        function openScoreModal(id) { const p = AppState.patients.find(x => x.id === id); const list = document.getElementById('score-list'); list.innerHTML = ""; let relevantScores = []; if(typeof SCORE_DEFINITIONS !== 'undefined') { relevantScores = SCORE_DEFINITIONS.filter(s => s.check(p)); } if(relevantScores.length === 0) { list.innerHTML = `<div class="p-4 text-slate-400 text-center col-span-2">Keine spezifischen Scores erkannt.<br>(Prüfe Diagnosen-Schreibweise)</div>`; } else { let scoresHtml = ""; relevantScores.forEach(s => { const link = s.url ? `href="${s.url}" target="_blank"` : ""; const tag = s.url ? "a" : "div"; scoresHtml += `<${tag} ${link} class="score-card group"><div><span class="score-name">${s.name}</span><span class="score-info">${s.info}</span></div><div class="score-arrow group-hover:text-blue-500">➜</div></${tag}>`; }); list.innerHTML = scoresHtml; } document.getElementById('scoreModal').style.display = "block"; }
    </script>
</body>
</html>
